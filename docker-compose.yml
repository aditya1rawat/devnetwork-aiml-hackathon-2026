services:
  neo4j:
    image: neo4j:5-community
    container_name: argus-neo4j
    ports:
      - "7474:7474"
      - "7687:7687"
    environment:
      NEO4J_AUTH: neo4j/devpass
      NEO4J_PLUGINS: '["apoc"]'
      NEO4J_dbms_memory_heap_max__size: 1G
      NEO4J_dbms_security_auth__minimum__password__length: "4"
    volumes:
      - neo4j-data:/data
volumes:
  neo4j-data:
